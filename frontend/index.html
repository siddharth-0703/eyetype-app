<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EyeType is a free, browser-based gaze-powered keyboard for people with ALS, motor neuron disease, and limited mobility. Type with your eyes using AI-powered eye tracking." />
    <meta name="keywords" content="eye tracking keyboard, ALS communication, assistive technology, gaze typing, motor neuron disease, accessibility, MediaPipe" />
    <meta property="og:title" content="EyeType — Gaze-Powered Keyboard for ALS & Motor Disabilities" />
    <meta property="og:description" content="Type with your eyes. Free, browser-based assistive keyboard powered by AI eye tracking." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>EyeType — Gaze-Powered Assistive Keyboard</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <link rel="manifest" href="/manifest.json" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
